<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='user_login.css') }}">
</head>
<body class="auth-page">

<div class="card">
    <h2>User Login</h2>

    {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
    {% endif %}

    <!-- ✅ FIXED HERE -->
    <form method="POST" action="{{ url_for('user_login') }}">

        <input type="tel"
               name="mobile"
               placeholder="Enter 10-digit mobile number"
               pattern="[0-9]{10}"
               required>

        <input type="password"
               name="password"
               placeholder="Enter password"
               minlength="6"
               required>

        <button type="submit">Login</button>

    </form>

    <div class="link">
        <p>
            Don't have an account?
            <!-- ✅ FIXED HERE -->
            <a href="{{ url_for('user_signup') }}">Create Account</a>
        </p>
    </div>

</div>

</body>
</html>
